<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">CHIEF workflow overview</title>
  <desc id="desc">Non-contrast head CT is encoded by CHIEF and used for report generation, emergency triage, image-to-text retrieval, and zero-shot abnormality detection.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1f2937" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#60758a"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1200" height="360" rx="22" fill="url(#bg)"/>
  <text x="600" y="45" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" fill="#1f3448">CHIEF: multimodal emergency head CT workflow</text>

  <g filter="url(#shadow)">
    <rect x="45" y="112" width="230" height="140" rx="18" fill="#ffffff" stroke="#9bb7cc" stroke-width="2"/>
    <circle cx="105" cy="182" r="38" fill="#dbeaf4" stroke="#6f9dbc" stroke-width="2"/>
    <path d="M82 182c8-25 38-36 55-15 14 18 1 47-24 52-23 5-39-15-31-37z" fill="none" stroke="#4c7896" stroke-width="4"/>
    <path d="M93 164c12 7 19 18 20 37M119 157c-4 13-2 27 7 39" fill="none" stroke="#6f9dbc" stroke-width="3" stroke-linecap="round"/>
    <text x="190" y="172" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#263f53">Non-contrast</text>
    <text x="190" y="200" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="700" fill="#263f53">head CT</text>
  </g>

  <line x1="285" y1="182" x2="425" y2="182" stroke="#60758a" stroke-width="4" marker-end="url(#arrow)"/>

  <g filter="url(#shadow)">
    <rect x="440" y="92" width="300" height="180" rx="22" fill="#244b68"/>
    <text x="590" y="160" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#ffffff">CHIEF</text>
    <text x="590" y="198" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#dce9f2">3D vision-language model</text>
    <text x="590" y="228" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#bed2e0">shared image representation</text>
  </g>

  <line x1="755" y1="182" x2="835" y2="182" stroke="#60758a" stroke-width="4" marker-end="url(#arrow)"/>

  <g font-family="Arial, Helvetica, sans-serif" filter="url(#shadow)">
    <rect x="850" y="72" width="300" height="54" rx="14" fill="#ffffff" stroke="#8cb4a4" stroke-width="2"/>
    <text x="1000" y="106" text-anchor="middle" font-size="19" font-weight="700" fill="#315f50">Report generation</text>

    <rect x="850" y="136" width="300" height="54" rx="14" fill="#ffffff" stroke="#d0a35e" stroke-width="2"/>
    <text x="1000" y="170" text-anchor="middle" font-size="19" font-weight="700" fill="#78531d">Emergency triage</text>

    <rect x="850" y="200" width="300" height="54" rx="14" fill="#ffffff" stroke="#9c91c6" stroke-width="2"/>
    <text x="1000" y="234" text-anchor="middle" font-size="19" font-weight="700" fill="#51477d">Image-to-text retrieval</text>

    <rect x="850" y="264" width="300" height="54" rx="14" fill="#ffffff" stroke="#c58fa0" stroke-width="2"/>
    <text x="1000" y="298" text-anchor="middle" font-size="19" font-weight="700" fill="#714454">Zero-shot abnormality detection</text>
  </g>
</svg>
